<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4학년 수학 퀴즈</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: #f5f5f5; color: #1a1a1a; font-size: 16px; }
  .wrap { max-width: 560px; margin: 0 auto; padding: 24px 16px 60px; }
  .page { display: none; }
  .page.active { display: block; }

  h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  h2 { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
  h3 { font-size: 15px; font-weight: 700; margin-bottom: 10px; }
  p.sub { font-size: 14px; color: #666; margin-bottom: 20px; }

  .card { background: #fff; border-radius: 14px; border: 1px solid #e5e5e5; padding: 18px; margin-bottom: 14px; }

  .stu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .stu-btn { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 10px 6px; text-align: center; cursor: pointer; font-size: 14px; font-weight: 600; transition: border-color .15s, background .15s; }
  .stu-btn:hover { border-color: #4285f4; background: #f0f6ff; }
  .stu-btn .stu-info { font-size: 11px; font-weight: 400; color: #888; margin-top: 2px; }

  select, input[type=number] { width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid #ddd; font-size: 15px; background: #fff; color: #1a1a1a; font-family: inherit; margin-bottom: 2px; }
  select:focus, input:focus { outline: none; border-color: #4285f4; box-shadow: 0 0 0 3px rgba(66,133,244,.15); }

  .row { margin-bottom: 14px; }
  .row label { display: block; font-size: 13px; color: #666; margin-bottom: 5px; }

  .btn { display: block; width: 100%; padding: 13px; border-radius: 12px; border: none; font-size: 16px; font-weight: 700; cursor: pointer; transition: opacity .15s, transform .1s; font-family: inherit; }
  .btn:hover { opacity: .9; }
  .btn:active { transform: scale(.98); }
  .btn-primary { background: #4285f4; color: #fff; }
  .btn-green { background: #34a853; color: #fff; }
  .btn-orange { background: #f9ab00; color: #3d2600; }
  .btn-gray { background: #e8eaed; color: #3c4043; }
  .btn-red { background: #ea4335; color: #fff; }
  .btn-sm { font-size: 14px; padding: 9px 14px; width: auto; display: inline-block; border-radius: 10px; }
  .btn-row { display: flex; gap: 8px; margin-top: 12px; }
  .btn-row .btn { flex: 1; }

  .back { background: none; border: none; color: #4285f4; font-size: 14px; cursor: pointer; padding: 0; margin-bottom: 16px; display: flex; align-items: center; gap: 4px; font-family: inherit; }

  .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .prog-text { font-size: 13px; color: #666; }

  .prog-bar { background: #e8eaed; border-radius: 99px; height: 6px; margin-bottom: 16px; overflow: hidden; }
  .prog-fill { height: 100%; background: #4285f4; border-radius: 99px; transition: width .3s; }

  .q-card { background: #fff; border-radius: 16px; border: 1px solid #e5e5e5; padding: 28px 20px; text-align: center; margin-bottom: 16px; }
  .q-type { font-size: 12px; color: #888; margin-bottom: 10px; }
  .q-text { font-size: 28px; font-weight: 700; letter-spacing: 1px; color: #1a1a1a; margin-bottom: 8px; line-height: 1.4; }
  .q-hint { font-size: 13px; color: #888; }

  /* 분수 표현 */
  .frac { display: inline-flex; flex-direction: column; align-items: center; vertical-align: middle; font-size: 22px; font-weight: 700; line-height: 1.1; margin: 0 3px; }
  .frac .fn { border-bottom: 2px solid #1a1a1a; padding-bottom: 1px; min-width: 22px; text-align: center; }
  .frac .fd { padding-top: 1px; min-width: 22px; text-align: center; }
  .mixed-frac { display: inline-flex; align-items: center; gap: 3px; vertical-align: middle; }
  .mixed-frac .whole { font-size: 26px; font-weight: 700; }
  .op-text { font-size: 28px; font-weight: 700; vertical-align: middle; margin: 0 6px; }

  /* 답 입력 */
  .ans-area { margin-bottom: 10px; }
  .ans-frac-wrap { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .ans-frac-box { display: inline-flex; flex-direction: column; align-items: center; gap: 3px; }
  .ans-frac-box input { width: 64px; font-size: 20px; text-align: center; font-weight: 700; padding: 8px 4px; margin: 0; }
  .ans-frac-line { width: 64px; height: 2px; background: #1a1a1a; border-radius: 2px; }
  .ans-whole input { width: 64px; font-size: 20px; text-align: center; font-weight: 700; padding: 8px 4px; margin: 0; }
  .ans-label { font-size: 12px; color: #888; text-align: center; margin-top: 2px; }

  .feedback { border-radius: 12px; padding: 12px 16px; font-size: 14px; line-height: 1.6; margin-bottom: 12px; }
  .feedback.ok { background: #e6f4ea; color: #137333; border: 1px solid #ceead6; }
  .feedback.ng { background: #fce8e6; color: #c5221f; border: 1px solid #f5c6c3; }

  .badge { font-size: 12px; padding: 3px 10px; border-radius: 20px; font-weight: 600; }
  .badge-green { background: #e6f4ea; color: #137333; }
  .badge-red { background: #fce8e6; color: #c5221f; }
  .badge-blue { background: #e8f0fe; color: #1a73e8; }
  .badge-amber { background: #fef7e0; color: #b06000; }
  .badge-purple { background: #f3e8fd; color: #7b1fa2; }

  .result-score-wrap { text-align: center; padding: 24px 16px; background: #fff; border-radius: 16px; border: 1px solid #e5e5e5; margin-bottom: 14px; }
  .result-score-big { font-size: 64px; font-weight: 700; line-height: 1; margin-bottom: 6px; }
  .result-score-sub { font-size: 15px; color: #666; margin-bottom: 16px; }
  .result-msg { font-size: 15px; font-weight: 600; padding: 10px 16px; border-radius: 10px; display: inline-block; }
  .result-msg.great { background: #e6f4ea; color: #137333; }
  .result-msg.good { background: #e8f0fe; color: #1a73e8; }
  .result-msg.try { background: #fce8e6; color: #c5221f; }

  .metric-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
  .metric { background: #f8f9fa; border-radius: 12px; padding: 14px 12px; text-align: center; }
  .metric-label { font-size: 12px; color: #666; margin-bottom: 4px; }
  .metric-val { font-size: 24px; font-weight: 700; }

  .wrong-item { border: 1px solid #e5e5e5; border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; background: #fff; }
  .wrong-q { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .wrong-ans { font-size: 13px; color: #c5221f; margin-bottom: 4px; }
  .wrong-correct { font-size: 13px; color: #137333; margin-bottom: 6px; }
  .wrong-analysis-tag { font-size: 12px; padding: 3px 10px; border-radius: 20px; background: #fef7e0; color: #b06000; font-weight: 600; display: inline-block; }

  /* 단원 선택 카드 */
  .unit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 4px; }
  .unit-card { background: #fff; border: 2px solid #e0e0e0; border-radius: 14px; padding: 18px 14px; text-align: center; cursor: pointer; transition: border-color .15s, background .15s; }
  .unit-card:hover { border-color: #4285f4; background: #f0f6ff; }
  .unit-card.u3 { border-color: #fbbc04; }
  .unit-card.u3:hover { background: #fffde7; }
  .unit-card.u5 { border-color: #34a853; }
  .unit-card.u5:hover { background: #e6f4ea; }
  .unit-card .u-num { font-size: 28px; font-weight: 700; margin-bottom: 6px; }
  .unit-card .u-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
  .unit-card .u-sub { font-size: 11px; color: #888; }

  /* 차시 선택 */
  .lesson-list { display: flex; flex-direction: column; gap: 8px; }
  .lesson-item { background: #fff; border: 1.5px solid #e0e0e0; border-radius: 10px; padding: 12px 14px; cursor: pointer; transition: border-color .15s, background .15s; }
  .lesson-item:hover { border-color: #34a853; background: #f0faf4; }
  .lesson-item.selected { border-color: #34a853; background: #e6f4ea; }
  .lesson-item .l-num { font-size: 11px; color: #34a853; font-weight: 700; margin-bottom: 3px; }
  .lesson-item .l-title { font-size: 14px; font-weight: 700; }
  .lesson-item .l-sub { font-size: 11px; color: #888; margin-top: 2px; }
  .lesson-item .l-badge { font-size: 10px; padding: 2px 7px; border-radius: 10px; background: #e6f4ea; color: #34a853; font-weight: 700; display: inline-block; margin-top: 4px; }

  /* 난이도 선택 */
  .diff-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .count-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .diff-btn { background: #fff; border: 2px solid #e0e0e0; border-radius: 10px; padding: 12px 6px; text-align: center; cursor: pointer; font-size: 14px; font-weight: 700; transition: all .15s; font-family: inherit; }
  .diff-btn.easy { border-color: #e0e0e0; }
  .diff-btn.easy.active { border-color: #34a853; background: #e6f4ea; color: #137333; }
  .diff-btn.normal { border-color: #e0e0e0; }
  .diff-btn.normal.active { border-color: #4285f4; background: #e8f0fe; color: #1a73e8; }
  .diff-btn.hard { border-color: #e0e0e0; }
  .diff-btn.hard.active { border-color: #ea4335; background: #fce8e6; color: #c5221f; }
  .count-choice.active { border-color: #4285f4; background: #e8f0fe; color: #1a73e8; }
  .diff-btn .d-emoji { font-size: 20px; margin-bottom: 4px; }
  .diff-btn .d-label { font-size: 13px; }
  .diff-btn .d-sub { font-size: 10px; color: #888; margin-top: 2px; }
  .difficulty-info { margin-top: 10px; border-radius: 10px; padding: 11px 13px; font-size: 12px; line-height: 1.65; background: #f8f9fa; color: #444; border: 1px solid #eceff1; }
  .difficulty-info b { color: #1a1a1a; }
  .story-q { text-align: left; font-size: 20px; font-weight: 700; line-height: 1.6; color: #1a1a1a; word-break: keep-all; }

  .tab-bar { display: flex; gap: 4px; margin-bottom: 16px; border-bottom: 1px solid #e5e5e5; }
  .tab { background: none; border: none; padding: 8px 14px; font-size: 14px; color: #888; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; font-family: inherit; font-weight: 600; transition: color .15s; }
  .tab.active { color: #1a73e8; border-bottom-color: #1a73e8; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 7px 8px; color: #888; border-bottom: 1px solid #e5e5e5; font-weight: 600; }
  td { padding: 7px 8px; border-bottom: 1px solid #f0f0f0; }
  tr:last-child td { border-bottom: none; }

  .notice { background: #e8f0fe; border-radius: 10px; padding: 12px 14px; font-size: 13px; color: #1a73e8; margin-bottom: 14px; line-height: 1.6; }
  .notice.warn { background: #fef7e0; color: #b06000; }
  .filter-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .filter-btn { background:#fff; border:1px solid #ddd; border-radius:10px; padding:10px 8px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; }
  .filter-btn.active { background:#e8f0fe; color:#1a73e8; border-color:#1a73e8; }

  @media (max-width: 400px) {
    .q-text { font-size: 22px; }
    .result-score-big { font-size: 52px; }
  }
</style>
</head>
<body>
<div class="wrap">

  <!-- 반 선택 -->
  <div id="pg-class" class="page active">
    <h1>4학년 수학 퀴즈</h1>
    <p class="sub">수명초등학교</p>
    <div class="card">
      <h3>우리 반을 선택하세요</h3>
      <div class="btn-row" style="margin-top:0"><button class="btn btn-primary" onclick="selectClass('4-1')">4학년 1반</button><button class="btn btn-primary" onclick="selectClass('4-2')">4학년 2반</button></div>
      <div class="btn-row"><button class="btn btn-primary" onclick="selectClass('4-3')">4학년 3반</button><button class="btn btn-primary" onclick="selectClass('4-4')">4학년 4반</button></div>
      <div class="btn-row"><button class="btn btn-primary" onclick="selectClass('4-5')">4학년 5반</button><button class="btn btn-primary" onclick="selectClass('4-6')">4학년 6반</button></div>
    </div>
    <button class="btn btn-gray" onclick="openTeacherDashboard()" style="margin-top:4px">교사 대시보드</button>
  </div>

  <!-- 학생 선택 -->
  <div id="pg-login" class="page">
    <button class="back" onclick="goClassPage()">← 반 다시 선택</button>
    <h1 id="class-title">수학 퀴즈</h1>
    <p class="sub">이름을 선택하세요</p>
    <div class="card">
      <h3 id="student-list-title">우리 반 학생</h3>
      <div class="stu-grid" id="stu-grid"></div>
    </div>
  </div>

  <!-- 단원 선택 -->
  <div id="pg-unit" class="page">
    <button class="back" onclick="showPage('pg-login')">← 학생 목록으로</button>
    <h2 id="unit-title">단원 선택</h2>
    <p class="sub" style="margin-bottom:12px">풀고 싶은 단원을 고르세요</p>
    <div class="unit-grid">
      <div class="unit-card u3" onclick="selectUnit('3')">
        <div class="u-num">3</div>
        <div class="u-title">곱셈과 나눗셈</div>
        <div class="u-sub">(두자리)×(두자리)<br>나눗셈 몫·나머지</div>
      </div>
      <div class="unit-card u5" onclick="selectUnit('5')">
        <div class="u-num">5</div>
        <div class="u-title">분수의 덧셈과 뺄셈</div>
        <div class="u-sub">진분수·대분수<br>덧셈과 뺄셈</div>
      </div>
    </div>
  </div>

  <!-- 설정 (3단원) -->
  <div id="pg-setup3" class="page">
    <button class="back" onclick="showPage('pg-unit')">← 단원 선택으로</button>
    <h2 id="setup3-title"></h2>
    <div class="card">
      <div class="row"><label>문제 수</label>
        <select id="sel-count3">
          <option value="5">5문제</option>
          <option value="10" selected>10문제</option>
          <option value="15">15문제</option>
        </select>
      </div>
      <div class="row"><label>유형</label>
        <select id="sel-type3">
          <option value="both">곱셈 + 나눗셈 혼합</option>
          <option value="mul">곱셈만</option>
          <option value="div">나눗셈만</option>
        </select>
      </div>
      <div id="retry-notice3" style="display:none" class="notice warn"></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="startQuiz3(false)">새 문제 시작 →</button>
      <button class="btn btn-orange" id="btn-retry3" style="display:none" onclick="startQuiz3(true)">오답 재도전 →</button>
    </div>
  </div>

  <!-- 설정 (5단원) -->
  <div id="pg-setup5" class="page">
    <button class="back" onclick="showPage('pg-unit')">← 단원 선택으로</button>
    <h2 id="setup5-title"></h2>

    <!-- 차시 선택 -->
    <div class="card">
      <h3>📚 차시 선택 <span style="font-size:12px;font-weight:400;color:#888">(선택한 차시까지 누적 출제)</span></h3>
      <div class="lesson-list" id="lesson-list"></div>
    </div>

    <!-- 난이도 -->
    <div class="card">
      <h3>🎯 난이도</h3>
      <div class="diff-grid">
        <button class="diff-btn diff-choice easy active" onclick="selectDiff('easy')">
          <div class="d-emoji">😊</div>
          <div class="d-label">쉬움</div>
          <div class="d-sub">개념 확인</div>
        </button>
        <button class="diff-btn diff-choice normal" onclick="selectDiff('normal')">
          <div class="d-emoji">🤔</div>
          <div class="d-label">보통</div>
          <div class="d-sub">교과서 기본</div>
        </button>
        <button class="diff-btn diff-choice hard" onclick="selectDiff('hard')">
          <div class="d-emoji">😤</div>
          <div class="d-label">어려움</div>
          <div class="d-sub">도전 문제</div>
        </button>
      </div>
      <div id="difficulty-info" class="difficulty-info"></div>
    </div>

    <!-- 문제 수 -->
    <div class="card">
      <h3>📝 문제 수</h3>
      <div class="count-grid">
        <button class="diff-btn count-choice" id="cnt-5" onclick="selectCount(5)">
          <div class="d-emoji">5</div>
          <div class="d-label">문제</div>
        </button>
        <button class="diff-btn count-choice active" id="cnt-10" onclick="selectCount(10)">
          <div class="d-emoji">10</div>
          <div class="d-label">문제</div>
        </button>
        <button class="diff-btn count-choice" id="cnt-15" onclick="selectCount(15)">
          <div class="d-emoji">15</div>
          <div class="d-label">문제</div>
        </button>
        <button class="diff-btn count-choice" id="cnt-20" onclick="selectCount(20)">
          <div class="d-emoji">20</div>
          <div class="d-label">문제</div>
        </button>
      </div>
    </div>

    <div id="retry-notice5" style="display:none" class="notice warn"></div>
    <div class="btn-row">
      <button class="btn btn-green" onclick="startQuiz5(false)">새 문제 시작 →</button>
      <button class="btn btn-orange" id="btn-retry5" style="display:none" onclick="startQuiz5(true)">오답 재도전 →</button>
    </div>
  </div>

  <!-- 퀴즈 (3단원) -->
  <div id="pg-quiz3" class="page">
    <div class="top-bar">
      <span class="prog-text" id="q3-progress">1 / 10</span>
      <span class="prog-text" id="q3-name-label" style="font-weight:700;color:#1a1a1a"></span>
    </div>
    <div class="prog-bar"><div class="prog-fill" id="q3-prog-fill" style="width:0%"></div></div>
    <div class="q-card">
      <div class="q-type" id="q3-type-label"></div>
      <div class="q-text" id="q3-text">?</div>
      <div class="q-hint" id="q3-hint"></div>
    </div>
    <div class="ans-area">
      <div class="ans-frac-wrap">
        <input type="number" id="ans3-main" placeholder="답" inputmode="numeric" style="font-size:20px;text-align:center;font-weight:700;max-width:120px;" />
        <input type="number" id="ans3-rem" placeholder="나머지" inputmode="numeric" style="display:none;font-size:20px;text-align:center;font-weight:700;max-width:120px;" />
        <button class="btn btn-primary btn-sm" id="btn3-submit" onclick="submitAns3()">확인</button>
      </div>
    </div>
    <div class="feedback" id="q3-feedback" style="display:none"></div>
    <button class="btn btn-gray" id="btn3-next" style="display:none" onclick="nextQ3()">다음 문제 →</button>
  </div>

  <!-- 퀴즈 (5단원) -->
  <div id="pg-quiz5" class="page">
    <div class="top-bar">
      <span class="prog-text" id="q5-progress">1 / 10</span>
      <span class="prog-text" id="q5-name-label" style="font-weight:700;color:#1a1a1a"></span>
    </div>
    <div class="prog-bar"><div class="prog-fill" id="q5-prog-fill" style="width:0%"></div></div>
    <div class="q-card">
      <div class="q-type" id="q5-type-label"></div>
      <div id="q5-display"></div>
      <div class="q-hint" id="q5-hint"></div>
    </div>
    <!-- 답 입력 영역 (동적 생성) -->
    <div class="ans-area" id="ans5-area"></div>
    <div class="feedback" id="q5-feedback" style="display:none"></div>
    <button class="btn btn-gray" id="btn5-next" style="display:none" onclick="nextQ5()">다음 문제 →</button>
  </div>

  <!-- 결과 (3단원) -->
  <div id="pg-result3" class="page">
    <h2 id="res3-student-name"></h2>
    <div class="result-score-wrap">
      <div class="result-score-big" id="res3-score-big"></div>
      <div class="result-score-sub" id="res3-score-sub"></div>
      <div class="result-msg" id="res3-msg"></div>
    </div>
    <div class="metric-grid">
      <div class="metric"><div class="metric-label">총 문제</div><div class="metric-val" style="color:#1a73e8" id="res3-total"></div></div>
      <div class="metric"><div class="metric-label">정답</div><div class="metric-val" style="color:#137333" id="res3-correct"></div></div>
      <div class="metric"><div class="metric-label">오답</div><div class="metric-val" style="color:#c5221f" id="res3-wrong"></div></div>
    </div>

// ===================== 3단원 문제 생성 =====================
function rand(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }

function makeQ3(type) {
  if (type === 'mul') { const a=rand(12,99),b=rand(12,99); return {type:'mul',q:`${a} × ${b} = ?`,answer:a*b,remainder:null,text:`${a}×${b}`,a,b}; }
  if (type === 'mul3') { const a=rand(100,999),b=rand(12,99); return {type:'mul3',q:`${a} × ${b} = ?`,answer:a*b,remainder:null,text:`${a}×${b}`,a,b}; }
  if (type === 'div') { const b=rand(12,99),q2=rand(2,9),r=rand(0,b-1),a=b*q2+r; return {type:'div',q:`${a} ÷ ${b} = ?`,answer:q2,remainder:r,text:`${a}÷${b}`,a,b}; }
  const b=rand(11,30),q2=rand(10,30),r=rand(0,b-1),a=b*q2+r;
  return {type:'div3',q:`${a} ÷ ${b} = ?`,answer:q2,remainder:r,text:`${a}÷${b}`,a,b};
}
function makeSimilar3(w) {
  if (w.type==='mul') { const a=Math.max(12,w.a+rand(-6,6)),b=Math.max(12,w.b+rand(-6,6)); return {type:'mul',q:`${a} × ${b} = ?`,answer:a*b,remainder:null,text:`${a}×${b}`,a,b}; }
  if (w.type==='mul3') { const a=Math.max(100,Math.min(999,w.a+rand(-20,20))),b=Math.max(12,w.b+rand(-6,6)); return {type:'mul3',q:`${a} × ${b} = ?`,answer:a*b,remainder:null,text:`${a}×${b}`,a,b}; }
  const b=Math.max(11,w.b+rand(-3,3)),q2=Math.max(w.type==='div3'?10:2,w.answer+rand(-2,2)),r=rand(0,b-1),a=b*q2+r;
  return {type:w.type,q:`${a} ÷ ${b} = ?`,answer:q2,remainder:r,text:`${a}÷${b}`,a,b};
}
function genQs3(isRetry, count) {
  const qs = [];
  if (isRetry) {
    const pool = [...(db[curStudent.id].wrongPool3||[])].sort(()=>Math.random()-.5);
    for (let i=0;i<Math.min(count,pool.length);i++) qs.push(makeSimilar3(pool[i]));
    while (qs.length<count) qs.push(makeQ3(['mul','mul3','div','div3'][rand(0,3)]));
  } else {
    const type = document.getElementById('sel-type3').value;
    for (let i=0;i<count;i++) {
      let t;
      if (type==='mul') t=i%2===0?'mul':'mul3';
      else if (type==='div') t=i%2===0?'div':'div3';
      else t=['mul','mul3','div','div3'][i%4];
      qs.push(makeQ3(t));
    }
  }
  return qs;
}

function getDenomRange() {
  if (sel5Diff === 'easy') return [2, 6];      // 작은 분모 중심
  if (sel5Diff === 'normal') return [3, 12];   // 교과서 기본 수준

function minDenominatorFor(type) {
  if (['add_pp_lt1', 'add_pp_gt1', 'add_mm', 'sub_pp', 'sub_mm_cant'].includes(type)) return 3;
  return 2;
}

function pickDenominator(type) {
  const [lo, hi] = getDenomRange();
  return rand(Math.max(lo, minDenominatorFor(type)), hi);
}

function wholeRange() {
  if (sel5Diff === 'easy') return [1, 3];
  if (sel5Diff === 'normal') return [1, 5];
  return [2, 8];
}

function weightedPick(items) {
  const total = items.reduce((sum, item) => sum + item.w, 0);
  let r = Math.random() * total;
  for (const item of items) {
    r -= item.w;
    if (r <= 0) return item.t;
  }
  return items[items.length - 1].t;
}

function availableTypesByLesson(lessonId) {
  const types = [];
  if (lessonId >= 1) types.push('add_pp_lt1');
  if (lessonId >= 2) types.push('add_np', 'add_pp_gt1');
  if (lessonId >= 3) types.push('add_mm');
  if (lessonId >= 4) types.push('sub_pp');
  if (lessonId >= 5) types.push('sub_mm_can');
  if (lessonId >= 6) types.push('sub_nm');
  if (lessonId >= 7) types.push('sub_mm_cant');
  return types;
}

function pickTypeForLesson(lessonId) {
  const allowed = availableTypesByLesson(lessonId);
  const weightMap = {
    easy:   { add_pp_lt1:5, add_np:3, add_pp_gt1:1, add_mm:1, sub_pp:4, sub_mm_can:2, sub_nm:1, sub_mm_cant:1 },
    normal: { add_pp_lt1:3, add_np:2, add_pp_gt1:2, add_mm:2, sub_pp:3, sub_mm_can:2, sub_nm:2, sub_mm_cant:2 },
    hard:   { add_pp_lt1:1, add_np:1, add_pp_gt1:3, add_mm:3, sub_pp:1, sub_mm_can:2, sub_nm:3, sub_mm_cant:4 }
  }[sel5Diff];
  return weightedPick(allowed.map(t => ({ t, w: weightMap[t] || 1 })));
}

// 최대공약수
function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }

// 분수 약분
function simplify(n, d) {
  const g = gcd(Math.abs(n), d);
  return [n/g, d/g];
}

// 분수 덧셈/뺄셈 결과를 대분수 형태로 반환 {whole, num, den}
function toMixed(num, den) {
  if (num < den) return { whole: 0, num, den };
  const w = Math.floor(num / den);
  const n = num % den;
  return { whole: w, num: n, den };
}

function makeQ5(lessonId) {
  const type = pickTypeForLesson(lessonId);
  const den = pickDenominator(type);
  return maybeAddStory(buildQ5(type, den));
}

function buildQ5(type, den) {
  let aw, bw, an, bn, ansW, ansN, ansD, qStr, qType;
  const [wMin, wMax] = wholeRange();

  if (type === 'add_pp_lt1') {
    // 쉬움에서 많이 나오는 기본형: 합이 1보다 작은 진분수+진분수
    do { an = rand(1, den-1); bn = rand(1, den-1); } while (an + bn >= den);
    ansW = 0; ansN = an + bn; ansD = den;
    qType = '합이 1보다 작은 (진분수)+(진분수)';
    qStr = `${an}/${den} + ${bn}/${den}`;
  }
  else if (type === 'add_pp_gt1') {
    // 계산 결과가 가분수이면 반드시 대분수로 나타내는 유형
    do { an = rand(1, den-1); bn = rand(1, den-1); } while (an + bn <= den);
    const total = an + bn;
    ansW = Math.floor(total / den); ansN = total % den; ansD = den;
    qType = '합이 1보다 큰 (진분수)+(진분수)';
    qStr = `${an}/${den} + ${bn}/${den}`;
  }
  else if (type === 'add_np') {
    // 자연수+진분수
    aw = rand(wMin, Math.min(wMax, 5)); an = rand(1, den-1);
    ansW = aw; ansN = an; ansD = den;
    qType = '(자연수)+(진분수)';
    qStr = `${aw} + ${an}/${den}`;
  }
  else if (type === 'add_mm') {
    // 대분수+대분수: 난이도에 따라 받아올림 빈도를 조절
    aw = rand(wMin, Math.min(wMax, 5)); bw = rand(wMin, Math.min(wMax, 5));
    if (sel5Diff === 'easy') {
      do { an = rand(1, den-1); bn = rand(1, den-1); } while (an + bn >= den);
    } else if (sel5Diff === 'hard') {
      do { an = rand(1, den-1); bn = rand(1, den-1); } while (an + bn < den);
    } else {
      an = rand(1, den-1); bn = rand(1, den-1);
    }
    const fracSum = an + bn;
    ansW = aw + bw + Math.floor(fracSum / den);
    ansN = fracSum % den; ansD = den;
    qType = '(대분수)+(대분수)';
    qStr = `${aw}과${an}/${den} + ${bw}과${bn}/${den}`;
  }
  else if (type === 'sub_pp') {
    // 진분수-진분수
    do { an = rand(1, den-1); bn = rand(1, den-1); } while (an <= bn);
    ansW = 0; ansN = an - bn; ansD = den;
    qType = '(진분수)-(진분수)';
    qStr = `${an}/${den} - ${bn}/${den}`;
  }
  else if (type === 'sub_mm_can') {
    // 분수 부분끼리 바로 뺄 수 있는 대분수 뺄셈
    aw = rand(Math.max(2, wMin + 1), Math.max(3, Math.min(wMax, 7)));
    bw = rand(1, aw - 1);
    an = rand(1, den-1);
    bn = sel5Diff === 'easy' ? rand(1, an) : rand(1, den-1);
    if (an < bn) [an, bn] = [bn, an];
    ansW = aw - bw; ansN = an - bn; ansD = den;
    qType = '분수 부분끼리 뺄 수 있는 (대분수)-(대분수)';
    qStr = `${aw}과${an}/${den} - ${bw}과${bn}/${den}`;
  }
  else if (type === 'sub_nm') {
    // 자연수-분수: 자연수에서 1만큼을 분수로 바꾸는 감각을 확인
    aw = rand(Math.max(2, wMin + 1), Math.max(3, Math.min(wMax, 8)));
    an = sel5Diff === 'easy' ? rand(1, Math.max(1, Math.floor((den-1)/2))) : rand(1, den-1);
    ansW = aw - 1; ansN = den - an; ansD = den;
    qType = '(자연수)-(분수)';
    qStr = `${aw} - ${an}/${den}`;
  }
  else { // sub_mm_cant
    // 분수 부분끼리 뺄 수 없어 받아내림이 필요한 대분수 뺄셈
    aw = rand(Math.max(2, wMin + 1), Math.max(3, Math.min(wMax, 8)));
    bw = rand(1, aw - 1);
    an = rand(1, den-2);
    bn = sel5Diff === 'easy' ? an + 1 : rand(an + 1, den - 1);
    ansW = (aw - 1) - bw;
    ansN = den + an - bn; ansD = den;
    qType = '분수 부분끼리 뺄 수 없는 (대분수)-(대분수)';
    qStr = `${aw}과${an}/${den} - ${bw}과${bn}/${den}`;
  }

  return { type, qStr, qType, ansW, ansN, ansD, den, originalStr: qStr, diff: sel5Diff };
}

function prettyExprText(expr) {
  return expr.replace(/과/g, '와 ').replace(/ \+ /g, ' 더하기 ').replace(/ - /g, ' 빼기 ');
}

function maybeAddStory(q) {
  if (sel5Diff !== 'hard' || Math.random() > 0.28) return q;
  const [left, right] = q.qStr.split(q.qStr.includes(' + ') ? ' + ' : ' - ');
  const leftText = prettyExprText(left);
  const rightText = prettyExprText(right);
  if (q.qStr.includes(' + ')) {
    q.story = `민지는 리본을 ${leftText} m 사용하고, 지호는 ${rightText} m 사용했습니다. 두 사람이 사용한 리본은 모두 몇 m인가요?`;
  } else {
    q.story = `물통에 물이 ${leftText} L 있었습니다. 그중 ${rightText} L를 사용했습니다. 남은 물은 몇 L인가요?`;
  }
  return q;
}

function escapeHTML(s) {
  return String(s).replace(/[&<>"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch]));
}

// 문제 파싱해서 HTML로 표시
function renderFrac(num, den) {
  return `<span class="frac"><span class="fn">${num}</span><span class="fd">${den}</span></span>`;
}

function renderMixed(whole, num, den) {
  if (whole === 0) return renderFrac(num, den);
  if (num === 0) return `<span style="font-size:26px;font-weight:700">${whole}</span>`;
  return `<span class="mixed-frac"><span class="whole">${whole}</span>${renderFrac(num, den)}</span>`;
}

function renderQ5Display(q) {
  if (q.story) {
    return `<div class="story-q">${escapeHTML(q.story)}</div>`;
  }
  // qStr 형식: "3/5 + 4/5", "2과3/5 + 1과1/5", "3 - 2/5" 등
  // 파싱해서 예쁜 분수 HTML로 변환
  const parts = q.qStr.split(' ');
  let html = '<div class="q-text" style="display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:4px;">';

  function parsePart(s) {
    if (s.includes('과')) {
      const [w, f] = s.split('과');
      const [n, d] = f.split('/');
      return renderMixed(parseInt(w), parseInt(n), parseInt(d));
    } else if (s.includes('/')) {
      const [n, d] = s.split('/');
      return renderFrac(parseInt(n), parseInt(d));
    } else {
      return `<span style="font-size:26px;font-weight:700">${s}</span>`;
    }
  }

  for (let i = 0; i < parts.length; i++) {
    const p = parts[i];
    if (p === '+' || p === '-') {
      html += `<span class="op-text">${p}</span>`;
    } else {
      html += parsePart(p);
    }
  }
  html += '<span class="op-text"> = ?</span></div>';
  return html;
}

// 답 입력 UI 생성
function buildAns5UI(q) {
  const area = document.getElementById('ans5-area');
  const needsWhole = q.ansW > 0 || q.type === 'add_mm' || q.type === 'sub_mm_can' || q.type === 'sub_mm_cant' || q.type === 'sub_nm' || q.type === 'add_np';

  // 답이 자연수인지 판단
  const isPureInt = (q.ansN === 0);

  let html = '<div class="ans-frac-wrap" id="ans5-inner">';

  if (isPureInt) {
    html += `<div class="ans-whole">
      <input type="number" id="a5-whole" placeholder="답" inputmode="numeric" />
      <div class="ans-label">정수</div>
    </div>`;
  } else {
    // 대분수 or 진분수
    const showWhole = needsWhole;
    if (showWhole) {
      html += `<div class="ans-whole">
        <input type="number" id="a5-whole" placeholder="0" inputmode="numeric" />
        <div class="ans-label">자연수</div>
      </div>
      <span style="font-size:24px;font-weight:700;margin:0 2px"></span>`;
    }
    html += `<div class="ans-frac-box">
      <input type="number" id="a5-num" placeholder="분자" inputmode="numeric" />
      <div class="ans-frac-line"></div>
      <input type="number" id="a5-den" placeholder="분모" inputmode="numeric" />
    </div>`;
  }

  html += `<button class="btn btn-green btn-sm" id="btn5-submit" onclick="submitAns5()" style="align-self:center">확인</button>`;
  html += '</div>';
  area.innerHTML = html;

  // 첫 입력창 포커스
  setTimeout(() => {
    const f = document.getElementById('a5-whole') || document.getElementById('a5-num');
    if (f) f.focus();
  }, 100);
}

function genQs5(isRetry, count) {
  const qs = [];
  if (isRetry) {
    const pool = [...(db[curStudent.id].wrongPool5||[])].sort(()=>Math.random()-.5);
    for (let i=0;i<Math.min(count,pool.length);i++) {
      const w = pool[i];
      qs.push(maybeAddStory(buildQ5(w.type, pickDenominator(w.type))));
    }
    while (qs.length < count) qs.push(makeQ5(sel5Lesson));
  } else {
    for (let i = 0; i < count; i++) qs.push(makeQ5(sel5Lesson));
  }
  return qs;
}

  document.getElementById('q3-hint').textContent = isDiv ? '몫과 나머지를 각각 입력하세요' : '';
  document.getElementById('ans3-main').placeholder = isDiv ? '몫' : '답';
  document.getElementById('ans3-main').value = '';

  document.getElementById('btn3-next').style.display = 'none';

}

function submitAns3() {
  if (cur3Answered) return;
  const mv = document.getElementById('ans3-main').value.trim();
  if (mv === '') return;
  const q = cur3Qs[cur3Idx];
  const userMain = parseInt(mv, 10);
  const isDiv = q.type==='div'||q.type==='div3';
  const userRem = isDiv ? parseInt(document.getElementById('ans3-rem').value.trim()||'0',10) : 0;
  const allOk = userMain===q.answer && (!isDiv || userRem===q.remainder);
  cur3Answered = true;
  document.getElementById('ans3-main').disabled = true;
  document.getElementById('ans3-rem').disabled = true;
  document.getElementById('btn3-submit').disabled = true;
  if (allOk) cur3Correct++;

    cur3Wrong++;

    db[curStudent.id].wrongPool3 = wp;
    saveDB();
  }

}

function formatFracText(w, n, d) {
  if (n === 0) return `${w}`;
  if (w === 0) return `${n}/${d}`;
  return `${w}과 ${n}/${d}`;
}

function analyzeError5(q, userW, userN, userD) {
  const improperUserN = userW === 0 ? userN : userW * userD + userN;
  const improperAnsN = q.ansW * q.ansD + q.ansN;
  if (q.ansW > 0 && userW === 0 && userD === q.ansD && userN === improperAnsN) {
    return '가분수를 대분수로 바꾸지 않았어요';
  }
  if (userD !== q.ansD) return '분모를 바꾸거나 분모까지 계산한 실수';
  if ((q.type === 'sub_nm' || q.type === 'sub_mm_cant') && userW !== q.ansW) return '받아내림 실수';
  if ((q.type === 'add_pp_gt1' || q.type === 'add_mm') && improperUserN === improperAnsN && userW !== q.ansW) return '가분수→대분수 변환 실수';
  if (userW !== q.ansW) return '자연수 부분 계산 실수';
  if (userN !== q.ansN) return '분자 계산 실수';
  return '계산 오류';
}

function submitAns5() {
  if (cur5Answered) return;
  const q = cur5Qs[cur5Idx];
  const isPureInt = (q.ansN === 0);
  const needsWhole = document.getElementById('a5-whole') !== null;

  let userW = 0, userN = 0, userD = q.ansD;

  if (isPureInt) {
    const v = document.getElementById('a5-whole').value.trim();
    if (v === '') return;
    userW = parseInt(v, 10); userN = 0; userD = q.ansD;
  } else {
    if (needsWhole) {
      const wv = document.getElementById('a5-whole').value.trim();
      userW = wv === '' ? 0 : parseInt(wv, 10);
    }
    const nv = document.getElementById('a5-num')?.value.trim();
    const dv = document.getElementById('a5-den')?.value.trim();
    if (!nv || !dv) return;
    userN = parseInt(nv, 10); userD = parseInt(dv, 10);
  }

  cur5Answered = true;
  // 비활성화
  ['a5-whole','a5-num','a5-den'].forEach(id => { const el = document.getElementById(id); if (el) el.disabled = true; });
  const sb = document.getElementById('btn5-submit'); if (sb) sb.disabled = true;

  // 정답 체크: 분모 같고, 자연수 같고, 분자 같아야
  const correct = userW === q.ansW && userN === q.ansN && userD === q.ansD;

  const fb = document.getElementById('q5-feedback');
  const correctStr = formatFracText(q.ansW, q.ansN, q.ansD);
  const userStr = formatFracText(userW, userN, userD);

  if (correct) {
    cur5Correct++;
    fb.className = 'feedback ok';
    fb.textContent = `✅ 정답이에요! (${correctStr})`;
  } else {
    cur5Wrong++;
    fb.className = 'feedback ng';
    const errType = analyzeError5(q, userW, userN, userD);
    fb.textContent = `❌ 틀렸어요. 내 답: ${userStr} / 정답: ${correctStr}
${errType}`;
    cur5WrongLog.push({ q, userW, userN, userD, errType });
    const wp = db[curStudent.id].wrongPool5 || [];
    if (!wp.find(w=>w.qStr===q.qStr)) wp.push({...q, addedAt:Date.now()});
    if (wp.length>30) wp.splice(0,wp.length-30);
    db[curStudent.id].wrongPool5 = wp;
    saveDB();
  }
  fb.style.display = 'block';
  document.getElementById('btn5-next').style.display = 'block';
}

function nextQ5() {
  cur5Idx++;
  if (cur5Idx >= cur5Qs.length) finishQuiz5();
  else renderQ5();
}

function renderResult(unit, total, correct, wrong, pct, wrongLog, session) {
  const u = unit;
  document.getElementById(`res${u}-student-name`).textContent = `${curStudent.className} ${curStudent.name} 학생 결과`;
  const sb = document.getElementById(`res${u}-score-big`);
  sb.textContent = pct + '%';
  sb.style.color = pct>=80?'#137333':pct>=60?'#1a73e8':'#c5221f';
  document.getElementById(`res${u}-score-sub`).textContent = `${correct}문제 정답 / ${total}문제`;
  const msg = document.getElementById(`res${u}-msg`);
  if (pct===100) { msg.textContent='완벽해요! 모두 맞혔어요!'; msg.className='result-msg great'; }
  else if (pct>=80) { msg.textContent='잘했어요! 조금만 더 연습하면 완벽해요.'; msg.className='result-msg great'; }
  else if (pct>=60) { msg.textContent='괜찮아요. 틀린 문제를 다시 도전해봐요.'; msg.className='result-msg good'; }
  else { msg.textContent='다시 한 번 도전해봐요! 연습하면 늘어요.'; msg.className='result-msg try'; }
  document.getElementById(`res${u}-total`).textContent = total;
  document.getElementById(`res${u}-correct`).textContent = correct;
  document.getElementById(`res${u}-wrong`).textContent = wrong;

  // 5단원 오답 상세
  const wa = document.getElementById(`res${u}-wrong-analysis`);
  if (wrongLog.length > 0 && unit === '5') {
    let html = `<div class="card"><h3>이번 오답 (${wrongLog.length}개)</h3>`;
    wrongLog.forEach(w => {
      const correctStr = formatFracText(w.q.ansW, w.q.ansN, w.q.ansD);
      const userStr = formatFracText(w.userW, w.userN, w.userD);
      html += `<div class="wrong-item">
        <div class="wrong-q">${w.q.qStr.replace(/과(\d+)\/(\d+)/g, ' $1/$2')} = ?</div>
        <div class="wrong-ans">내 답: ${userStr}</div>
        <div class="wrong-correct">정답: ${correctStr}</div>
        <span class="wrong-analysis-tag">${w.errType || w.q.qType}</span>
      </div>`;
    });
    html += '</div>';
    wa.innerHTML = html;
  } else { wa.innerHTML = ''; }

  // 누적 오답
  const wp = (unit==='5') ? db[curStudent.id].wrongPool5 : db[curStudent.id].wrongPool3;
  const wpl = document.getElementById(`res${u}-wrong-pool`);
  if (wp && wp.length > 0) {
    let html = `<div class="card"><h3>누적 오답 (${wp.length}개)</h3>`;
    wp.forEach(w => {
      const qs = unit==='5' ? w.qStr : w.q.replace('= ?','');
      html += `<div class="wrong-item"><div class="wrong-q">${qs}</div></div>`;
    });
    html += `<button class="btn btn-red" style="margin-top:8px" onclick="clearWrong${u}()">오답 목록 초기화</button></div>`;
    wpl.innerHTML = html;
  } else { wpl.innerHTML = ''; }
}

function clearWrong5() { db[curStudent.id].wrongPool5=[]; saveDB(); document.getElementById('res5-wrong-pool').innerHTML=''; }

async function saveToSheets(session, wrongLog, statusId) {
  const saveEl = document.getElementById(statusId);
  if (!GAS_URL) { saveEl.style.display='none'; return; }
  saveEl.style.display='block'; saveEl.textContent='결과 저장 중...'; saveEl.className='notice';
  try {
    const wrongSummary = wrongLog.map(w => w.q ? `${w.q.qStr||w.q.q||''}${w.errType ? '('+w.errType+')' : ''}` : '').join(' / ');
    const params = new URLSearchParams({
      action:'saveResult', className:curStudent.className, name:curStudent.name,
      date:session.date, time:session.time, total:session.total,
      correct:session.correct, wrong:session.wrong, pct:session.pct,
      unit:session.unit||'3', lesson:session.lesson||'', difficulty:session.diff||'', wrongList:wrongSummary
    });
    await fetch(GAS_URL+'?'+params.toString(), {method:'GET',mode:'no-cors'});
    saveEl.textContent='Google Sheets에 저장되었습니다.';
    saveEl.style.background='#e6f4ea'; saveEl.style.color='#137333';
  } catch(e) {
    saveEl.textContent='저장 실패 — 인터넷 연결을 확인하세요.';
    saveEl.className='notice warn';
  }
}

// ===================== 교사 대시보드 =====================
function setTeacherClassFilter(cls) { teacherClassFilter=cls; renderTeacher(); renderWrongAnalysis(); }
function getTeacherStudents() { return teacherClassFilter==='all' ? STUDENTS : STUDENTS.filter(s=>s.className===teacherClassFilter); }

function renderClassFilterButtons(cid) {
  const box=document.getElementById(cid); if (!box) return;
  const labels=['all',...Object.keys(CLASSES)];
  box.innerHTML=labels.map(c=>`<button class="filter-btn ${teacherClassFilter===c?'active':''}" onclick="setTeacherClassFilter('${c}')">${c==='all'?'전체':c}</button>`).join('');
}

function renderTeacher() {
  document.getElementById('teacher-notice').style.display='none';
  renderClassFilterButtons('teacher-class-filter');
  renderClassFilterButtons('detail-class-filter');
  const fs=getTeacherStudents();
  const allS=[...fs.flatMap(s=>(db[s.id].sessions3||[]).map(x=>({...x,unit:'3'}))), ...fs.flatMap(s=>(db[s.id].sessions5||[]).map(x=>({...x,unit:'5'})))];
  const total=allS.length, avg=total>0?Math.round(allS.reduce((a,b)=>a+b.pct,0)/total):0;
  const totalWrong=fs.reduce((a,s)=>a+(db[s.id].wrongPool3||[]).length+(db[s.id].wrongPool5||[]).length,0);
  const active=fs.filter(s=>(db[s.id].sessions3||[]).length>0||(db[s.id].sessions5||[]).length>0).length;
  const pre=teacherClassFilter==='all'?'전체':teacherClassFilter;
  document.getElementById('teacher-metrics').innerHTML=`
    <div class="metric"><div class="metric-label">${pre} 응시 학생</div><div class="metric-val" style="color:#1a73e8">${active}명</div></div>
    <div class="metric"><div class="metric-label">${pre} 총 풀이</div><div class="metric-val">${total}</div></div>
    <div class="metric"><div class="metric-label">${pre} 평균 정답률</div><div class="metric-val" style="color:${avg>=80?'#137333':avg>=60?'#1a73e8':'#c5221f'}">${avg}%</div></div>
    <div class="metric"><div class="metric-label">${pre} 누적 오답</div><div class="metric-val" style="color:#c5221f">${totalWrong}</div></div>`;
  if (document.getElementById('teacher-list-title')) document.getElementById('teacher-list-title').textContent=`${pre} 학생별 현황`;
  const tbody=document.getElementById('teacher-tbody'); tbody.innerHTML='';
  fs.forEach(s=>{
    const r=db[s.id];
    const s3=(r.sessions3||[]),s5=(r.sessions5||[]);
    const n=s3.length+s5.length;
    const allPct=[...s3,...s5].map(x=>x.pct);
    const avg2=allPct.length>0?Math.round(allPct.reduce((a,b)=>a+b,0)/allPct.length):null;
    const lastArr=[...s3,...s5].sort((a,b)=>a.date<b.date?1:-1);
    const last=lastArr.length>0?lastArr[0].date:'-';
    const wc=(r.wrongPool3||[]).length+(r.wrongPool5||[]).length;
    const tr=document.createElement('tr');
    tr.innerHTML=`<td>${s.className}</td><td>${s.name}</td><td>${n}</td><td>${avg2!==null?`<span class="badge ${avg2>=80?'badge-green':avg2>=60?'badge-blue':'badge-red'}">${avg2}%</span>`:'-'}</td><td>${last}</td><td>${wc>0?`<span class="badge badge-red">${wc}</span>`:0}</td>`;
    tbody.appendChild(tr);
  });
  const dsel=document.getElementById('detail-sel'); dsel.innerHTML='';
  fs.forEach(s=>{ const o=document.createElement('option'); o.value=s.id; o.textContent=`${s.className} ${s.name}`; dsel.appendChild(o); });
  renderDetail();
}

function renderDetail() {
  const sid=document.getElementById('detail-sel').value;
  const dc=document.getElementById('detail-content');
  if (!sid) { dc.innerHTML='<p style="color:#888;font-size:14px;margin-top:8px">학생을 선택하세요.</p>'; return; }
  const r=db[sid], s=STUDENTS.find(x=>x.id===sid);
  const all=[...(r.sessions3||[]).map(x=>({...x,unit:'3'})), ...(r.sessions5||[]).map(x=>({...x,unit:'5'}))];
  if (!all.length) { dc.innerHTML='<p style="color:#888;font-size:14px;margin-top:8px">아직 응시 기록이 없습니다.</p>'; return; }
  let html=`<div class="card"><h3>${s.className} ${s.name} 학생 기록</h3><div style="overflow-x:auto"><table><thead><tr><th>날짜</th><th>단원</th><th>총</th><th>정답</th><th>오답</th><th>정답률</th></tr></thead><tbody>`;
  all.slice().reverse().forEach(se=>{
    const unitLabel = se.unit==='5' ? `5단원 ${se.lesson||''}차시 ${se.diff||''}` : '3단원';
    html+=`<tr><td>${se.date}</td><td style="font-size:11px">${unitLabel}</td><td>${se.total}</td><td>${se.correct}</td><td>${se.wrong}</td><td><span class="badge ${se.pct>=80?'badge-green':se.pct>=60?'badge-blue':'badge-red'}">${se.pct}%</span></td></tr>`;
  });
  html+=`</tbody></table></div></div>`;
  dc.innerHTML=html;
}

function renderWrongAnalysis() {
  const wa=document.getElementById('wrong-analysis');
  const all=[];
  getTeacherStudents().forEach(s=>{ (db[s.id].wrongPool5||[]).forEach(w=>all.push({student:`${s.className} ${s.name}`, ...w})); });
  if (!all.length) { wa.innerHTML='<p style="color:#888;font-size:14px">현재 5단원 오답 없음.</p>'; return; }
  let html=`<div class="card"><h3>5단원 오답 상세 (${all.length}개)</h3><div style="overflow-x:auto"><table><thead><tr><th>학생</th><th>문제</th><th>유형</th></tr></thead><tbody>`;
  all.forEach(w=>{
    html+=`<tr><td>${w.student}</td><td style="font-size:12px">${w.qStr||''}</td><td><span class="badge badge-purple" style="font-size:10px">${w.qType||''}</span></td></tr>`;
  });
  html+=`</tbody></table></div></div>`;
  wa.innerHTML=html;
}

function switchTab(id) {
  ['tab-overview','tab-detail','tab-wrong'].forEach(t=>document.getElementById(t).style.display='none');
  document.getElementById(id).style.display='block';
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['tab-overview','tab-detail','tab-wrong'][i]===id));
  if (id==='tab-detail') renderDetail();
  if (id==='tab-wrong') renderWrongAnalysis();
}

// Enter 키
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const pg = document.querySelector('.page.active');
  if (!pg) return;
  if (pg.id === 'pg-quiz3' && !cur3Answered) submitAns3();
  else if (pg.id === 'pg-quiz5' && !cur5Answered) submitAns5();
  else if (pg.id === 'pg-quiz5' && cur5Answered) nextQ5();
});

loadDB();
showPage('pg-class');
</script>
